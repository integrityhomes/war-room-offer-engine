name: Core regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            war_room_offer_engine/requirements.txt

      - name: Install application dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then python -m pip install -r requirements.txt; fi
          if [[ -f war_room_offer_engine/requirements.txt ]]; then python -m pip install -r war_room_offer_engine/requirements.txt; fi

      - name: Compile production source
        shell: bash
        run: python -m compileall -q war_room_offer_engine/war_room_offer_engine

      - name: Run complete smoke-test suite
        shell: bash
        run: |
          set -euo pipefail

          test_root="war_room_offer_engine/war_room_offer_engine"
          mapfile -d '' tests < <(
            find "$test_root" -type f -name '*_smoke_test.py' -print0 | sort -z
          )

          if (( ${#tests[@]} == 0 )); then
            echo "ERROR: No smoke tests were discovered under $test_root."
            exit 1
          fi

          echo "Discovered ${#tests[@]} smoke test(s):"
          printf '  %s\n' "${tests[@]}"

          for test_file in "${tests[@]}"; do
            echo "::group::Running $test_file"
            python "$test_file"
            echo "::endgroup::"
          done
